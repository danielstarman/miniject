schema_version = 1

[local_policy]
protected_branches = ["refs/heads/master"]
require_clean_primary_checkout = true

[hooks]
mode = "generated"

[certification]
mode = "ssh-signed"

[[certification.trusted_signer]]
name = "miniject-repocert"
public_key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDfLjrZnYSQ15EsQ2LeeNm6l58YwdNp03JP+eWPLyo2D miniject-repocert"

[checks.ruff_format]
argv = [".venv/bin/python", "-m", "ruff", "format", "--check", "."]

[checks.ruff_lint]
argv = [".venv/bin/python", "-m", "ruff", "check", "."]

[checks.pyright]
argv = [".venv/bin/python", "-m", "pyright", "--pythonpath", ".venv/bin/python", "-p", "."]

[checks.pytest]
argv = [".venv/bin/python", "-m", "pytest", "-q"]

[fixers.ruff_format]
argv = [".venv/bin/python", "-m", "ruff", "format", "."]
probe_argv = [".venv/bin/python", "-m", "ruff", "format", "--check", "."]

[profiles.default]
checks = ["ruff_format", "ruff_lint", "pyright", "pytest"]
fixers = ["ruff_format"]
certify = true
default = true

[[protected_refs]]
pattern = "refs/heads/master"
profile = "default"
